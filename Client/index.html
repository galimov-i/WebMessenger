<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>WebMessenger</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Экран входа/регистрации -->
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <h1 class="app-title">WebMessenger</h1>
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login" onclick="console.log('Login tab clicked')">Вход</button>
                    <button class="auth-tab" data-tab="register" onclick="console.log('Register tab clicked')">Регистрация</button>
                </div>
                
                <!-- Форма входа -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-username">Имя пользователя</label>
                        <input type="text" id="login-username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" name="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </form>
                
                <!-- Форма регистрации -->
                <form id="register-form" class="auth-form hidden">
                    <div class="form-group">
                        <label for="register-username">Имя пользователя</label>
                        <input type="text" id="register-username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Пароль</label>
                        <input type="password" id="register-password" name="password" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">Подтверждение пароля</label>
                        <input type="password" id="register-password-confirm" name="password_confirm" required autocomplete="new-password">
                    </div>
                    <!-- Индикатор сложности пароля -->
                    <div class="password-strength-container">
                        <div class="password-strength-header">
                            <span>Сложность пароля:</span>
                            <span id="password-strength-label" class="password-strength-label">не оценено</span>
                        </div>
                        <div class="password-strength-meter">
                            <div class="password-strength-bar" id="password-strength-bar"></div>
                        </div>
                        <div class="password-strength-details">
                            <div>Время взлома: <span id="password-crack-time">неизвестно</span></div>
                            <div>Рекомендации:</div>
                            <ul id="password-recommendations" class="password-recommendations">
                                <li>Введите пароль для оценки</li>
                            </ul>
                        </div>
                        <div class="password-generator">
                            <button type="button" id="generate-password-btn" class="btn btn-small">Сгенерировать надёжный пароль</button>
                            <div class="generated-password-container hidden">
                                <input type="text" id="generated-password" readonly>
                                <button type="button" id="copy-password-btn" class="btn btn-small">Копировать</button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                </form>
                
                <div id="auth-error" class="error-message hidden"></div>
            </div>
        </div>
        
        <!-- Основной экран -->
        <div id="main-screen" class="screen hidden">
            <header class="app-header">
                <button id="back-to-users-btn" class="btn btn-icon mobile-only" title="К списку пользователей">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h2 class="header-title">WebMessenger</h2>
                <div class="header-actions">
                    <div class="current-user-info">
                        <span class="current-user-label">Вы:</span>
                        <span id="current-user" class="current-user-name"></span>
                    </div>
                    <button id="logout-btn" class="btn btn-small">Выйти</button>
                </div>
            </header>
            
            <div class="main-layout">
                <!-- Список пользователей -->
                <aside class="users-sidebar">
                    <h3 class="sidebar-title">Контакты</h3>
                    <div class="search-box">
                        <input type="text" id="user-search" placeholder="Поиск пользователя..." autocomplete="off">
                    </div>
                    <div id="users-list" class="users-list">
                        <!-- Список пользователей будет загружен динамически -->
                    </div>
                </aside>
                    
                <!-- Область чата -->
                <main class="chat-area">
                    <div id="chat-placeholder" class="chat-placeholder">
                        <p>Выберите пользователя для начала общения</p>
                    </div>
                    
                    <div id="chat-container" class="chat-container hidden">
                        <div class="chat-header">
                            <button id="show-users-btn" class="btn btn-icon mobile-only" title="К списку пользователей">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </button>
                            <h3 id="chat-with-user"></h3>
                            <span id="user-status" class="user-status offline">оффлайн</span>
                        </div>
                        
                        <div id="messages" class="messages">
                            <!-- Сообщения будут загружены динамически -->
                        </div>
                        
                        <form id="message-form" class="message-form">
                            <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                            <button type="submit" class="btn btn-primary">Отправить</button>
                        </form>
                    </div>
                </main>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно входящего звонка -->
    <div id="incoming-call-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Входящий звонок</h3>
            <p id="incoming-caller">Пользователь</p>
            <div class="call-actions">
                <button id="accept-call-btn" class="btn btn-success">Принять</button>
                <button id="reject-call-btn" class="btn btn-danger">Отклонить</button>
            </div>
        </div>
    </div>

    <!-- Экран активного звонка -->
    <div id="active-call-screen" class="call-screen hidden">
        <div class="call-header">
            <h3>Звонок</h3>
            <p id="call-peer">Пользователь</p>
            <div class="call-status" id="call-status">Соединение...</div>
        </div>
        <div class="call-controls">
            <button id="mute-call-btn" class="btn btn-icon" title="Отключить микрофон">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C9.243 2 7 4.243 7 7v3c0 .552.448 1 1 1s1-.448 1-1V7c0-1.654 1.346-3 3-3s3 1.346 3 3v3c0 .552.448 1 1 1s1-.448 1-1V7c0-2.757-2.243-5-5-5z"/>
                    <path d="M19 10c-.552 0-1 .448-1 1v2c0 2.757-2.243 5-5 5s-5-2.243-5-5v-2c0-.552-.448-1-1-1s-1 .448-1 1v2c0 3.52 2.613 6.432 6 6.92V20h-2c-.552 0-1 .448-1 1s.448 1 1 1h4c.552 0 1-.448 1-1s-.448-1-1-1h-2v-1.08c3.387-.488 6-3.4 6-6.92v-2c0-.552-.448-1-1-1z"/>
                </svg>
            </button>
            <button id="hangup-call-btn" class="btn btn-danger" title="Завершить звонок">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M12 9c-1.654 0-3 1.346-3 3s1.346 3 3 3 3-1.346 3-3-1.346-3-3-3z"/>
                    <path d="M20.292 3.707l-1.414-1.414L12 10.586 5.122 3.707 3.708 5.121 10.586 12l-6.878 6.879 1.414 1.414L12 13.414l6.878 6.879 1.414-1.414L13.414 12l6.878-6.879z"/>
                </svg>
            </button>
            <button id="speaker-call-btn" class="btn btn-icon" title="Динамик">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"/>
                    <path d="M13 7h-2v6h2V7zm0 8h-2v2h2v-2z"/>
                </svg>
            </button>
        </div>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <script src="js/crypto.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/call.js"></script>
    <script src="js/password-strength.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
